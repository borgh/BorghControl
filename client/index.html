<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>BorghControl — Controle Financeiro</title>
    <meta name="description" content="Sistema completo de controle financeiro: contas a pagar, contas a receber, relatórios e dashboard." />

    <!-- PWA / Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a3a2a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="BorghControl" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BorghControl" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BorghControl — Controle Financeiro" />
    <meta property="og:description" content="Sistema completo de controle financeiro pessoal." />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#1a3a2a" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Registro do Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) {
              console.log('[PWA] Service Worker registrado:', reg.scope);
            })
            .catch(function(err) {
              console.warn('[PWA] Falha ao registrar Service Worker:', err);
            });
        });
      }
    </script>
  </body>

</html>
